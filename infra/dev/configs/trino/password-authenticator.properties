password-authenticator.name=ldap
ldap.url=ldaps://openldap:636
ldap.ssl.truststore.path=/etc/trino/certs/ca.crt
ldap.bind-dn=cn=admin,dc=oss-data-platform,dc=local
ldap.bind-password=${ENV:LDAP_ADMIN_PASSWORD}
ldap.user-bind-pattern=uid=${USER},ou=People,dc=oss-data-platform,dc=local
ldap.user-base-dn=ou=People,dc=oss-data-platform,dc=local
# LDAP auth verifies credentials only; Ranger enforces group-based authorization.
# To additionally restrict which LDAP groups may connect at the auth layer, enable
# the memberOf overlay in OpenLDAP (run `make openldap-init`) and restore the
# group filter: (&(objectClass=inetOrgPerson)(uid=${USER})(|(memberOf=cn=trino_admin,...)))
ldap.group-auth-pattern=(&(objectClass=inetOrgPerson)(uid=${USER}))
