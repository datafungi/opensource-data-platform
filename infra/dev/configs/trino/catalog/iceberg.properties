connector.name=iceberg
iceberg.catalog.type=rest
iceberg.rest-catalog.uri=http://polaris:8181/api/catalog
iceberg.rest-catalog.prefix=warehouse
iceberg.rest-catalog.warehouse=s3://iceberg-warehouse
iceberg.rest-catalog.security=OAUTH2
iceberg.rest-catalog.oauth2.credential=${ENV:POLARIS_CLIENT_CREDENTIAL}
iceberg.rest-catalog.oauth2.server-uri=${ENV:POLARIS_OAUTH2_SERVER_URI}
iceberg.rest-catalog.oauth2.scope=${ENV:POLARIS_OAUTH2_SCOPE}
iceberg.rest-catalog.session=NONE
iceberg.security=SYSTEM

# SeaweedFS stays as the object-store credential source in local dev.
fs.native-s3.enabled=true
s3.endpoint=http://seaweedfs:8333
s3.path-style-access=true
s3.aws-access-key=${ENV:SEAWEEDFS_ACCESS_KEY}
s3.aws-secret-key=${ENV:SEAWEEDFS_SECRET_KEY}
s3.region=us-east-1
