services:
  rustfs:
    image: rustfs/rustfs:latest
    environment:
      RUSTFS_VOLUMES: /data
      RUSTFS_ADDRESS: :9000
      RUSTFS_CONSOLE_ADDRESS: :9001
      RUSTFS_CONSOLE_ENABLE: "true"
      RUSTFS_REGION: ${RUSTFS_REGION:-us-east-1}
      RUSTFS_ACCESS_KEY: ${RUSTFS_ACCESS_KEY:-rustfsadmin}
      RUSTFS_SECRET_KEY: ${RUSTFS_SECRET_KEY:-rustfsadmin}
    ports:
      - "9100:9000"
      - "9101:9001"
    volumes:
      - rustfs-data:/data
    networks:
      - data-platform-dev
    healthcheck:
      # RustFS returns 403 on the health endpoint (auth required), unlike MinIO which
      # returns 200 unauthenticated. Both 200 and 403 confirm the server is up.
      test: ["CMD-SHELL", "curl -s -o /dev/null -w '%{http_code}' http://localhost:9000/minio/health/live | grep -qE '^(200|403)$'"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

volumes:
  rustfs-data:

networks:
  data-platform-dev:
    external: true
