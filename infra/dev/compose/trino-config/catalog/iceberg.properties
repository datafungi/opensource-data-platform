connector.name=iceberg
iceberg.catalog.type=rest
iceberg.rest-catalog.uri=http://polaris:8181
iceberg.rest-catalog.warehouse=s3://iceberg-warehouse
iceberg.rest-catalog.security=NONE

# SeaweedFS as S3-compatible object store for Iceberg data files
fs.native-s3.enabled=true
s3.endpoint=http://seaweedfs:8333
s3.path-style-access=true
s3.aws-access-key=${ENV:SEAWEEDFS_ACCESS_KEY}
s3.aws-secret-key=${ENV:SEAWEEDFS_SECRET_KEY}
s3.region=us-east-1
