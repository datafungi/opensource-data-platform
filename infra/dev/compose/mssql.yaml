services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2025-latest
    environment:
      - ACCEPT_EULA=Y
      - SA_PASSWORD=${MSSQL_SA_PASSWORD:-admin}
    ports:
      - "1433:1433"
    volumes:
      - sql_data:/var/opt/mssql
    networks:
      - data-platform-dev
    healthcheck:
      interval: 5s
      timeout: 3s
      start_period: 10s
      retries: 10
      test: /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P
        ${MSSQL_SA_PASSWORD:-admin} -Q "SELECT 1" -b -o /dev/null -No

volumes:
  sql_data:

networks:
  data-platform-dev:
    external: true
