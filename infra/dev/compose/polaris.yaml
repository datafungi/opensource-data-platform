services:
  polaris-postgres:
    image: postgres:18.3
    environment:
      POSTGRES_USER: ${POLARIS_DB_USER:-postgres}
      POSTGRES_PASSWORD: ${POLARIS_DB_PASSWORD:-postgres}
      POSTGRES_DB: ${POLARIS_DB_NAME:-POLARIS}
      POSTGRES_INITDB_ARGS: "--encoding UTF8 --data-checksums"
    volumes:
      - polaris-postgres-data-v2:/var/lib/postgresql
    networks:
      - data-platform-dev
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POLARIS_DB_USER:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 15
      start_period: 10s
    restart: unless-stopped

  polaris-bootstrap:
    image: apache/polaris-admin-tool:1.4.1
    entrypoint: ["sh", "-c"]
    environment:
      POLARIS_PERSISTENCE_TYPE: relational-jdbc
      QUARKUS_DATASOURCE_JDBC_URL: jdbc:postgresql://polaris-postgres:5432/${POLARIS_DB_NAME:-POLARIS}
      QUARKUS_DATASOURCE_USERNAME: ${POLARIS_DB_USER:-postgres}
      QUARKUS_DATASOURCE_PASSWORD: ${POLARIS_DB_PASSWORD:-postgres}
    # The bootstrap command is idempotent-wrapped: exit 0 when already bootstrapped.
    command:
      - >
        java -jar /deployments/polaris-admin-tool.jar bootstrap
        --realm=POLARIS
        --credential=POLARIS,${POLARIS_BOOTSTRAP_CLIENT_ID:-root},${POLARIS_BOOTSTRAP_CLIENT_SECRET:-s3cr3t}
        || true
    depends_on:
      polaris-postgres:
        condition: service_healthy
    networks:
      - data-platform-dev

  polaris:
    image: apache/polaris:1.4.1
    ports:
      - "8181:8181"
      - "8182:8182"
    environment:
      POLARIS_PERSISTENCE_TYPE: relational-jdbc
      POLARIS_PERSISTENCE_RELATIONAL_JDBC_MAX_RETRIES: "5"
      POLARIS_PERSISTENCE_RELATIONAL_JDBC_INITIAL_DELAY_IN_MS: "100"
      POLARIS_PERSISTENCE_RELATIONAL_JDBC_MAX_DURATION_IN_MS: "5000"
      QUARKUS_DATASOURCE_JDBC_URL: jdbc:postgresql://polaris-postgres:5432/${POLARIS_DB_NAME:-POLARIS}
      QUARKUS_DATASOURCE_USERNAME: ${POLARIS_DB_USER:-postgres}
      QUARKUS_DATASOURCE_PASSWORD: ${POLARIS_DB_PASSWORD:-postgres}
      POLARIS_REALM_CONTEXT_REALMS: POLARIS
      POLARIS_BOOTSTRAP_CREDENTIALS: POLARIS,${POLARIS_BOOTSTRAP_CLIENT_ID:-root},${POLARIS_BOOTSTRAP_CLIENT_SECRET:-s3cr3t}
      QUARKUS_OTEL_SDK_DISABLED: "true"
      polaris.features."ALLOW_INSECURE_STORAGE_TYPES": "true"
      polaris.features."SUPPORTED_CATALOG_STORAGE_TYPES": "[\"FILE\",\"S3\",\"GCS\",\"AZURE\"]"
      polaris.readiness.ignore-severe-issues: "true"
    depends_on:
      polaris-postgres:
        condition: service_healthy
      polaris-bootstrap:
        condition: service_completed_successfully
    networks:
      - data-platform-dev
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8182/q/health"]
      interval: 10s
      timeout: 10s
      retries: 15
      start_period: 20s
    restart: unless-stopped

networks:
  data-platform-dev:
    external: true

volumes:
  polaris-postgres-data-v2:
