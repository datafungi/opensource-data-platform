services:
  marquez-api:
    image: marquezproject/marquez:0.51.1
    container_name: marquez-api
    env_file:
      - .env
    environment:
      - MARQUEZ_PORT=${MARQUEZ_PORT}
      - MARQUEZ_ADMIN_PORT=${MARQUEZ_ADMIN_PORT}
      - POSTGRES_HOST=platform-postgres
      - POSTGRES_PORT=5432
      - POSTGRES_USER=${MARQUEZ_USER}
      - POSTGRES_PASSWORD=${MARQUEZ_PASSWORD}
      - POSTGRES_DB=${MARQUEZ_DB}
    ports:
      - "5000:5000"
      - "5001:5001"
    networks:
      - data-platform
    cpus: "0.20"
    mem_limit: 512M
    restart: on-failure

  marquez-web:
    image: marquezproject/marquez-web:0.51.1
    container_name: marquez-web
    environment:
      - MARQUEZ_HOST=marquez-api
      - MARQUEZ_PORT=5000
      - WEB_PORT=3000
    ports:
      - "3000:3000"
    networks:
      - data-platform
    cpus: "0.10"
    mem_limit: 256M
    depends_on:
      - marquez-api
    restart: on-failure

networks:
  data-platform:
    external: true
    name: data-platform
