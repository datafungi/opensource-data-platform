# =============================================================================
# oss-data-platform — Spark defaults
#
# Non-secret structural settings are baked here.
# The one secret this file intentionally omits is the Polaris OAuth2 credential.
# Pass it at job submission time (Airflow SparkSubmitOperator or spark-submit):
#
#   --conf spark.sql.catalog.iceberg.credential=<client_id>:<client_secret>
#
# S3A credentials (AWS_ACCESS_KEY_ID / AWS_SECRET_ACCESS_KEY) are injected as
# container environment variables in compose and inherited by executor JVMs.
# =============================================================================

# -- Iceberg ------------------------------------------------------------------
# Enable Iceberg SQL extensions (MERGE INTO, time travel, etc.)
spark.sql.extensions                                    org.apache.iceberg.spark.extensions.IcebergSparkSessionExtensions

# Named catalog "iceberg" backed by the Polaris REST catalog server.
# OAuth2 credential (client_id:client_secret) is NOT baked here; pass it at
# job submission via --conf spark.sql.catalog.iceberg.credential=<id>:<secret>
# or set it in Airflow's SparkSubmitOperator conf parameter.
spark.sql.catalog.iceberg                               org.apache.iceberg.spark.SparkCatalog
spark.sql.catalog.iceberg.type                          rest
spark.sql.catalog.iceberg.uri                           http://polaris:8181/api/catalog
spark.sql.catalog.iceberg.warehouse                     s3a://warehouse/
spark.sql.catalog.iceberg.scope                         PRINCIPAL_ROLE:ALL
spark.sql.defaultCatalog                                iceberg

# -- S3A — SeaweedFS (s3a://) -------------------------------------------------
spark.hadoop.fs.s3a.impl                                org.apache.hadoop.fs.s3a.S3AFileSystem
# Required for SeaweedFS and MinIO: disables virtual-hosted-style URLs
spark.hadoop.fs.s3a.path.style.access                   true
# Disable TLS for local/dev object store; enable in production
spark.hadoop.fs.s3a.connection.ssl.enabled              false
spark.hadoop.fs.s3a.endpoint                            http://seaweedfs:8333
# hadoop-aws 3.4.x uses AWS SDK v2; the default credential chain reads
# AWS_ACCESS_KEY_ID / AWS_SECRET_ACCESS_KEY from the executor environment.
# These are set as container env vars in compose and inherited by executor JVMs.

# -- Adaptive Query Execution -------------------------------------------------
spark.sql.adaptive.enabled                              true
spark.sql.adaptive.coalescePartitions.enabled           true
spark.sql.adaptive.skewJoin.enabled                     true

# -- Arrow / Pandas API on Spark ----------------------------------------------
# Required for toPandas(), mapInArrow(), and pandas UDFs
spark.sql.execution.arrow.pyspark.enabled               true
# Fall back to row-based transfer when Arrow fails (e.g. unsupported types)
spark.sql.execution.arrow.pyspark.fallback.enabled      true

# -- Event log (uncomment and mount a volume to enable History Server) --------
# spark.eventLog.enabled                                  true
# spark.eventLog.dir                                      s3a://spark-logs/
