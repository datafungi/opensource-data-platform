---
# Deploys the monitoring stack (Prometheus, Grafana, exporters) to Docker Swarm.
#
# Prerequisites:
#   1. deploy-databases.yml has run (data-platform overlay network exists, Postgres healthy)
#   2. az login is active on this machine
#   3. collection installed: ansible-galaxy collection install -r requirements.yml
#
# Usage:
#   ansible-playbook deploy-monitor.yml

# ── Play 1: Ensure monitoring secrets exist in Key Vault ──────────────────────
- name: Ensure monitoring secrets in Key Vault
  hosts: localhost
  connection: local
  gather_facts: false
  tasks:
    - name: Check if Grafana admin password exists in Key Vault
      ansible.builtin.command: >
        az keyvault secret show
        --vault-name {{ keyvault_name }}
        --name grafana-admin-password
        --query value -o tsv
      register: grafana_password_check
      changed_when: false
      failed_when: false
      no_log: true

    - name: Generate and store Grafana admin password
      when: grafana_password_check.rc != 0
      ansible.builtin.command: >
        az keyvault secret set
        --vault-name {{ keyvault_name }}
        --name grafana-admin-password
        --value {{ lookup('pipe', 'openssl rand -base64 24') | quote }}
      changed_when: true
      no_log: true

    - name: Read Grafana admin password from Key Vault
      ansible.builtin.command: >
        az keyvault secret show
        --vault-name {{ keyvault_name }}
        --name grafana-admin-password
        --query value -o tsv
      register: grafana_password
      changed_when: false
      no_log: true

    - name: Read Airflow DB password for postgres-exporter DSN
      ansible.builtin.command: >
        az keyvault secret show
        --vault-name {{ keyvault_name }}
        --name postgres-airflow-password
        --query value -o tsv
      register: pg_airflow_password
      changed_when: false
      no_log: true

    - name: Set monitoring facts
      ansible.builtin.set_fact:
        grafana_password: "{{ grafana_password.stdout }}"
        postgres_exporter_dsn: >-
          postgresql://airflow:{{ pg_airflow_password.stdout }}@postgres:5432/airflow?sslmode=disable
      no_log: true


# ── Play 2: Create Docker resources and deploy stack ──────────────────────────
- name: Deploy monitoring stack
  hosts: swarm_primary
  gather_facts: false
  pre_tasks:
    - name: Install Python Docker SDK
      ansible.builtin.apt:
        name:
          - python3-pip
          - python3-docker
        state: present
        update_cache: true
      become: true

  tasks:
    - name: Create grafana_admin_password Docker secret
      community.docker.docker_secret:
        name: grafana_admin_password
        data: "{{ hostvars.localhost.grafana_password }}"
        state: present
      no_log: true

    - name: Create postgres_exporter_dsn Docker secret
      community.docker.docker_secret:
        name: postgres_exporter_dsn
        data: "{{ hostvars.localhost.postgres_exporter_dsn }}"
        state: present
      no_log: true

    - name: Create prometheus_config Docker config
      community.docker.docker_config:
        name: prometheus_config
        data: "{{ lookup('file', playbook_dir + '/../../../compose/prometheus/prometheus.yml') }}"
        state: present

    - name: Create statsd_mapping Docker config
      community.docker.docker_config:
        name: statsd_mapping
        data: "{{ lookup('file', playbook_dir + '/../../../compose/statsd/statsd_mapping.yml') }}"
        state: present

    # Prometheus runs as UID 65534 (nobody); Grafana runs as UID 472.
    # GlusterFS replicates these directories to all nodes — creating them on
    # node-1 is enough. Without this, Docker raises "invalid mount config for
    # type bind: bind source path does not exist" when scheduling on node-3.
    - name: Create GlusterFS directories for monitoring services
      ansible.builtin.file:
        path: "{{ item.path }}"
        state: directory
        owner: "{{ item.owner }}"
        group: "{{ item.owner }}"
        mode: "0755"
      loop:
        - { path: /mnt/gluster/prometheus-data, owner: "65534" }
        - { path: /mnt/gluster/grafana-data,    owner: "472"   }
      become: true

    - name: Create stack directory
      ansible.builtin.file:
        path: /opt/stacks
        state: directory
        mode: "0755"
      become: true

    - name: Copy monitor compose file
      ansible.builtin.copy:
        src: "{{ playbook_dir }}/../../../compose/monitor.yaml"
        dest: /opt/stacks/monitor.yaml
        mode: "0644"
      become: true

    - name: Deploy monitoring stack
      ansible.builtin.command: >
        docker stack deploy
        --compose-file /opt/stacks/monitor.yaml
        {{ stack_name }}
      register: stack_deploy
      changed_when: >
        'Creating service' in stack_deploy.stdout or
        'Updating service' in stack_deploy.stdout
