---
# Removes all running Swarm stacks and the Postgres Docker secrets.
#
# Does NOT remove:
#   - Docker configs (airflow_entrypoint)
#   - Non-Postgres Docker secrets (azure_mi_client_id)
#   - Overlay networks (data-platform)
#   - Azure infrastructure (VMs, Key Vault, storage)
#
# After teardown, run `terraform apply` to rotate Postgres passwords, then
# re-run deploy-databases.yml and deploy-airflow.yml.
#
# Usage:
#   ansible-playbook teardown.yml

- name: Tear down Docker Swarm stacks
  hosts: swarm_primary
  gather_facts: false

  tasks:
    - name: Remove stack
      ansible.builtin.command: docker stack rm {{ stack_name }}
      register: stack_rm
      changed_when: true
      failed_when:
        - stack_rm.rc != 0
        - "'Nothing found in stack' not in stack_rm.stderr"

    - name: Wait for all services to shut down
      ansible.builtin.shell: >
        docker service ls --filter label=com.docker.stack.namespace={{ stack_name }} -q | wc -l
      register: service_count
      until: service_count.stdout | trim == '0'
      retries: 30
      delay: 5
      changed_when: false

    - name: Remove Postgres Docker secrets
      community.docker.docker_secret:
        name: "{{ item }}"
        state: absent
      loop:
        - postgres_superuser_password
        - postgres_airflow_password
        - postgres_polaris_password
