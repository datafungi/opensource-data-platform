# Prometheus configuration for the data platform Docker Swarm stack.
# Deployed via Docker config: prometheus_config (see data-platform.yml).
# Scraped targets use Docker Swarm overlay DNS names.

global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: statsd
    static_configs:
      - targets:
          - "statsd-exporter:9102"

  - job_name: postgres
    static_configs:
      - targets:
          - "postgres-exporter:9187"

  - job_name: redis
    static_configs:
      - targets:
          - "redis-exporter:9121"

  - job_name: node
    static_configs:
      - targets:
          - "node-exporter:9100"
