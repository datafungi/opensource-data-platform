# Prometheus configuration for the standalone observability stack.
# Deployed via Docker config: prometheus_config (see monitor.yaml).
# Scraped targets use Docker Swarm overlay DNS names on the shared data-platform
# overlay network.

global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: statsd
    static_configs:
      - targets:
          - "statsd-exporter:9102"

  - job_name: postgres
    static_configs:
      - targets:
          - "postgres-exporter:9187"

  - job_name: redis
    static_configs:
      - targets:
          - "redis-exporter:9121"

  # node-exporter runs as a global service (one task per Swarm node). Overlay
  # DNS resolves to the VIP and would only reach one task at a time. Instead,
  # each node is scraped directly by private IP on the host-published port.
  - job_name: node
    static_configs:
      - targets: ["10.54.1.10:9100"]
        labels:
          node: node-1
      - targets: ["10.54.1.11:9100"]
        labels:
          node: node-2
      - targets: ["10.54.1.12:9100"]
        labels:
          node: node-3
