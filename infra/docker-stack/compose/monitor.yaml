services:
  prometheus:
    image: prom/prometheus:latest
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.console.libraries=/usr/share/prometheus/console_libraries"
      - "--web.console.templates=/usr/share/prometheus/consoles"
    configs:
      - source: prometheus_config
        target: /etc/prometheus/prometheus.yml
    volumes:
      - /mnt/gluster/prometheus-data:/prometheus
    ports:
      - "9090:9090"
    networks:
      - data-platform
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:9090/-/healthy || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.labels.nodename == node3
      resources:
        limits:
          cpus: "0.20"
          memory: 512M
        reservations:
          cpus: "0.10"
          memory: 256M
      update_config:
        parallelism: 1
        delay: 15s
        failure_action: rollback
        order: stop-first
      rollback_config:
        parallelism: 1
        delay: 10s
      restart_policy:
        condition: on-failure
        delay: 10s
        max_attempts: 5
        window: 120s

  grafana:
    image: grafana/grafana:latest
    environment:
      GF_SECURITY_ADMIN_PASSWORD_FILE: /run/secrets/grafana_admin_password
      GF_PATHS_DATA: /var/lib/grafana
    secrets:
      - grafana_admin_password
    volumes:
      - /mnt/gluster/grafana-data:/var/lib/grafana
    ports:
      - "3000:3000"
    networks:
      - data-platform
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.labels.nodename == node3
      resources:
        limits:
          cpus: "0.20"
          memory: 512M
        reservations:
          cpus: "0.10"
          memory: 256M
      update_config:
        parallelism: 1
        delay: 15s
        failure_action: rollback
        order: start-first
      rollback_config:
        parallelism: 1
        delay: 10s
      restart_policy:
        condition: on-failure
        delay: 10s
        max_attempts: 5
        window: 120s

  statsd-exporter:
    image: prom/statsd-exporter:latest
    command:
      - "--statsd.mapping-config=/etc/statsd/mapping.yml"
    configs:
      - source: statsd_mapping
        target: /etc/statsd/mapping.yml
    ports:
      - "9102:9102"
      - "9125:9125/udp"
    networks:
      - data-platform
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.labels.nodename == node3
      resources:
        limits:
          cpus: "0.05"
          memory: 64M
        reservations:
          cpus: "0.02"
          memory: 32M
      update_config:
        parallelism: 1
        delay: 15s
        failure_action: rollback
        order: start-first
      rollback_config:
        parallelism: 1
        delay: 10s
      restart_policy:
        condition: on-failure
        delay: 10s
        max_attempts: 5
        window: 120s

  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:latest
    environment:
      DATA_SOURCE_NAME_FILE: /run/secrets/postgres_exporter_dsn
    secrets:
      - postgres_exporter_dsn
    networks:
      - data-platform
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.labels.nodename == node3
      resources:
        limits:
          cpus: "0.05"
          memory: 64M
        reservations:
          cpus: "0.02"
          memory: 32M
      update_config:
        parallelism: 1
        delay: 15s
        failure_action: rollback
        order: start-first
      rollback_config:
        parallelism: 1
        delay: 10s
      restart_policy:
        condition: on-failure
        delay: 10s
        max_attempts: 5
        window: 120s

  redis-exporter:
    image: oliver006/redis_exporter:latest
    environment:
      REDIS_ADDR: "redis://redis:6379"
    networks:
      - data-platform
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.labels.nodename == node3
      resources:
        limits:
          cpus: "0.05"
          memory: 64M
        reservations:
          cpus: "0.02"
          memory: 32M
      update_config:
        parallelism: 1
        delay: 15s
        failure_action: rollback
        order: start-first
      rollback_config:
        parallelism: 1
        delay: 10s
      restart_policy:
        condition: on-failure
        delay: 10s
        max_attempts: 5
        window: 120s

  node-exporter:
    image: prom/node-exporter:latest
    command:
      - "--path.procfs=/host/proc"
      - "--path.sysfs=/host/sys"
      - "--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)"
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    # host-mode publish binds directly on the VM's NIC (10.54.1.x:9100) rather
    # than going through the Swarm ingress VIP. Prometheus scrapes each node by
    # private IP so all three instances are reached independently.
    ports:
      - mode: host
        target: 9100
        published: 9100
    deploy:
      mode: global
      resources:
        limits:
          cpus: "0.05"
          memory: 64M
        reservations:
          cpus: "0.02"
          memory: 32M
      update_config:
        parallelism: 1
        delay: 15s
        failure_action: rollback
        order: start-first
      rollback_config:
        parallelism: 1
        delay: 10s
      restart_policy:
        condition: on-failure
        delay: 10s
        max_attempts: 5
        window: 120s

networks:
  data-platform:
    external: true

configs:
  prometheus_config:
    external: true
  statsd_mapping:
    external: true

secrets:
  grafana_admin_password:
    external: true
  postgres_exporter_dsn:
    external: true
