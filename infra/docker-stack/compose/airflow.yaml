x-airflow-common: &airflow-common
  image: ${AIRFLOW_IMAGE}
  entrypoint: ["/opt/scripts/airflow-entrypoint.sh"]
  environment: &airflow-common-env
    AIRFLOW__CORE__AUTH_MANAGER: airflow.providers.fab.auth_manager.fab_auth_manager.FabAuthManager
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "true"
    AIRFLOW__CORE__DAGS_FOLDER: /dags/repo/airflow/dags
    AIRFLOW__CORE__EXECUTION_API_SERVER_URL: "http://airflow-apiserver:8080/execution/"
    AIRFLOW__CORE__EXECUTOR: CeleryExecutor
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    AIRFLOW__CORE__PLUGINS_FOLDER: /dags/repo/airflow/dags/plugins
    AIRFLOW__CORE__TEST_CONNECTION: "Enabled"
    AIRFLOW__METRICS__STATSD_HOST: statsd-exporter
    AIRFLOW__METRICS__STATSD_ON: "true"
    AIRFLOW__METRICS__STATSD_PORT: "9125"
    AIRFLOW__SCHEDULER__ENABLE_HEALTH_CHECK: "true"
    # Key Vault secret backend — resolves DAG connections and variables on demand.
    # vault_url is substituted from the deploying shell by docker stack deploy.
    AIRFLOW__SECRETS__BACKEND: airflow.providers.microsoft.azure.secrets.key_vault.AzureKeyVaultBackend
    AIRFLOW__SECRETS__BACKEND_KWARGS: '{"vault_url": "https://${KEYVAULT_NAME}.vault.azure.net/", "connections_prefix": "airflow-connections", "variables_prefix": "airflow-variables", "config_prefix": "airflow-config"}'
    # Infrastructure secrets fetched from Key Vault at startup.
    # The backend looks up airflow-config-{value} in Key Vault for each.
    AIRFLOW__CORE__FERNET_KEY_SECRET: fernet-key
    AIRFLOW__API__SECRET_KEY_SECRET: api-secret-key
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN_SECRET: sql-alchemy-conn
    AIRFLOW__CELERY__BROKER_URL_SECRET: broker-url
    AIRFLOW__CELERY__RESULT_BACKEND_SECRET: result-backend
    # Remote logging — task logs written to Azure Blob Storage via managed identity.
    # Connection azure_blob_logs is resolved from Key Vault by the secrets backend.
    AIRFLOW__LOGGING__REMOTE_LOGGING: "true"
    AIRFLOW__LOGGING__REMOTE_BASE_LOG_FOLDER: "wasb://airflow-logs"
    AIRFLOW__LOGGING__REMOTE_LOG_CONN_ID: "azure_blob_logs"
    AIRFLOW__LOGGING__DELETE_LOCAL_LOGS: "true"
  volumes:
  - type: bind
    source: /opt/dags
    target: /dags
    read_only: true
  configs:
  - source: airflow_entrypoint
    target: /opt/scripts/airflow-entrypoint.sh
    mode: 0755
  networks:
  - data-platform
  secrets:
  - azure_mi_client_id
  user: "50000:0"

services:

  airflow-apiserver:
    <<: *airflow-common
    command: api-server
    ports:
    - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/api/v2/version"]
      interval: 30s
      timeout: 120s
      retries: 5
      start_period: 180s
    deploy:
      replicas: 1
      resources:
        limits:
          cpus: "0.50"
          memory: 1G
        reservations:
          cpus: "0.25"
          memory: 256M
      update_config:
        parallelism: 1
        delay: 15s
        failure_action: rollback
        order: start-first
      rollback_config:
        parallelism: 1
        delay: 10s
      restart_policy:
        condition: on-failure
        delay: 10s
        max_attempts: 3

  airflow-scheduler:
    <<: *airflow-common
    command: scheduler
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8974/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s
    deploy:
      replicas: 1
      placement:
        constraints:
        - node.labels.nodename == node1
      resources:
        limits:
          cpus: "0.50"
          memory: 1536M
        reservations:
          cpus: "0.25"
          memory: 512M
      update_config:
        parallelism: 1
        delay: 15s
        failure_action: rollback
        order: stop-first
      rollback_config:
        parallelism: 1
        delay: 10s
      restart_policy:
        condition: on-failure
        delay: 10s
        max_attempts: 3

  airflow-dag-processor:
    <<: *airflow-common
    command: dag-processor
    healthcheck:
      test:
      - "CMD-SHELL"
      - 'airflow jobs check --job-type DagProcessorJob --hostname "$${HOSTNAME}"'
      interval: 30s
      timeout: 120s
      retries: 5
      start_period: 30s
    deploy:
      replicas: 1
      placement:
        constraints:
        - node.labels.nodename == node1
      resources:
        limits:
          cpus: "0.75"
          memory: 2G
        reservations:
          cpus: "0.25"
          memory: 512M
      update_config:
        parallelism: 1
        delay: 15s
        failure_action: rollback
        order: stop-first
      rollback_config:
        parallelism: 1
        delay: 10s
      restart_policy:
        condition: on-failure
        delay: 10s
        max_attempts: 3

  airflow-triggerer:
    <<: *airflow-common
    command: triggerer
    healthcheck:
      test: ["CMD-SHELL", 'airflow jobs check --job-type TriggererJob --hostname "$${HOSTNAME}"']
      interval: 30s
      timeout: 120s
      retries: 5
      start_period: 30s
    deploy:
      replicas: 1
      placement:
        constraints:
        - node.labels.nodename == node1
      resources:
        limits:
          cpus: "0.50"
          memory: 1G
        reservations:
          cpus: "0.25"
          memory: 512M
      update_config:
        parallelism: 1
        delay: 15s
        failure_action: rollback
        order: stop-first
      rollback_config:
        parallelism: 1
        delay: 10s
      restart_policy:
        condition: on-failure
        delay: 10s
        max_attempts: 3

  airflow-worker:
    <<: *airflow-common
    command: celery worker
    environment:
      <<: *airflow-common-env
      DUMB_INIT_SETSID: "0"
    healthcheck:
      test:
      - "CMD-SHELL"
      - 'celery --app airflow.providers.celery.executors.celery_executor.app inspect ping -d "celery@$${HOSTNAME}"'
      interval: 30s
      timeout: 30s
      retries: 5
      start_period: 30s
    deploy:
      mode: global
      placement:
        constraints:
        - node.labels.nodename != node1
      resources:
        limits:
          cpus: "1.00"
          memory: 3G
        reservations:
          cpus: "0.50"
          memory: 1G
      update_config:
        parallelism: 1
        delay: 15s
        failure_action: rollback
        order: stop-first
      rollback_config:
        parallelism: 1
        delay: 10s
      restart_policy:
        condition: on-failure
        delay: 10s
        max_attempts: 3

  airflow-flower:
    <<: *airflow-common
    command: celery flower
    ports:
    - "5555:5555"
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:5555/"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    deploy:
      replicas: 1
      resources:
        limits:
          cpus: "0.15"
          memory: 512M
        reservations:
          cpus: "0.05"
          memory: 256M
      update_config:
        parallelism: 1
        delay: 15s
        failure_action: rollback
        order: start-first
      rollback_config:
        parallelism: 1
        delay: 10s
      restart_policy:
        condition: on-failure
        delay: 10s
        max_attempts: 3

  git-sync:
    image: registry.k8s.io/git-sync/git-sync:v4.4.0
    environment:
      GITSYNC_REPO: "${REPO_URL}"
      GITSYNC_REF: "${REPO_REF:-main}"
      GITSYNC_ROOT: /dags
      GITSYNC_LINK: repo
      GITSYNC_PERIOD: 60s
      GITSYNC_DEPTH: "1"
      GITSYNC_SSH_KEY_FILE: /etc/git-secret/ssh
      GITSYNC_SSH_KNOWN_HOSTS_FILE: /etc/git-secret/known_hosts
    volumes:
    - type: bind
      source: /opt/dags
      target: /dags
    configs:
    - source: gitsync_known_hosts
      target: /etc/git-secret/known_hosts
      mode: 0444
    secrets:
    - source: gitsync_ssh_key
      target: /etc/git-secret/ssh
      uid: "65533"
      mode: 0400
    networks:
    - data-platform
    deploy:
      mode: global
      resources:
        limits:
          cpus: "0.10"
          memory: 128M
        reservations:
          cpus: "0.05"
          memory: 64M
      restart_policy:
        condition: on-failure
        delay: 10s
        max_attempts: 3

networks:
  data-platform:
    external: true

configs:
  airflow_entrypoint:
    external: true
  gitsync_known_hosts:
    external: true

secrets:
  azure_mi_client_id:
    external: true
  gitsync_ssh_key:
    external: true
