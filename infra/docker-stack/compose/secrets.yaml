services:
  vault:
    image: hashicorp/vault:1.19.0
    # Production mode: file storage on GlusterFS, manually unsealed.
    # Run `vault operator init` then `vault operator unseal` (3x) after first deploy.
    # See docs/vault_setup.md for the full bootstrap procedure.
    command: vault server -config=/vault/config/vault.hcl
    cap_add:
      - IPC_LOCK
    configs:
      - source: vault_config
        target: /vault/config/vault.hcl
        mode: 0444
    volumes:
      - type: bind
        source: /mnt/gluster/vault-data
        target: /vault/data
    ports:
      - target: 8200
        published: 8200
        protocol: tcp
        mode: host
    networks:
      - data-platform
    healthcheck:
      # Returns 0 when initialized+unsealed, 1 when sealed, 2 when not init'd.
      # We accept exit code 1 (sealed) because sealed → needs operator action,
      # not a container failure. Use `docker exec ... vault status` to check.
      test: ["CMD-SHELL", "vault status || exit 0"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.labels.stateful == true
          - node.labels.nodename == node1
      resources:
        limits:
          cpus: "0.25"
          memory: 256M
        reservations:
          cpus: "0.10"
          memory: 128M
      restart_policy:
        condition: on-failure
        delay: 10s
        max_attempts: 5
        window: 300s

networks:
  data-platform:
    external: true

configs:
  vault_config:
    external: true
