# ----------------------------
# HR Employee Events — 9 matching blocks (one Hire event per employee)
# Python post-processor will replace these with authoritative events
# ----------------------------

# Hire events for SG Junior (20)
- object: hr_employee_events
  count: 20
  fields:
    event_id: ${{object_name + "-" + str(child_index)}}
    employee_id:
      random_reference: SG_Junior
    event_type: Hire
    effective_date: ${{fake.date_between(start_date='-39M', end_date='-1M')}}
    old_salary:
    old_job_title:
    new_salary:
      random_number:
        min: 4000
        max: 6000
    new_job_title:
      random_choice:
        - Junior Data Engineer
        - Junior Consultant
        - Junior Analyst
        - Junior Developer

