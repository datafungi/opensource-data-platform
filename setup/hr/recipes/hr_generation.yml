    department_name: Engineering
    cost_center: CC-ENG-002

- object: hr_departments
  nickname: DeptSALES
  count: 1
  fields:
    department_id: DEPT-SALES
    department_name: Sales
    cost_center: CC-SALES-003

- object: hr_departments
  nickname: DeptHR
  count: 1
  fields:
    department_id: DEPT-HR
    department_name: Human Resources
    cost_center: CC-HR-004

- object: hr_departments
  nickname: DeptFIN
  count: 1
  fields:
    department_id: DEPT-FIN
    department_name: Finance
    cost_center: CC-FIN-005


# ----------------------------
# HR Employees — 15 blocks (5 departments × 3 locations) = 150 total
#
# Job titles are department-specific. Salary is a placeholder; the
# post-processing script (generate_events.py) recomputes salary from
# the tier implied by job_title.
#
# Location targets: SG=60, VN=51, ID=39
# Department targets: PS=60, ENG=38, SALES=23, HR=15, FIN=14
# ----------------------------

# ---- Professional Services — SG (24) ----
- object: hr_employees
  nickname: PS_SG
  count: 24
  fields:
    employee_id: ${{this.id}}
    first_name:
      fake: first_name
    last_name:
      fake: last_name
    email:
      fake: email
    job_title:
      random_choice:
        - Junior Consultant
        - Junior Consultant
        - Junior Business Analyst
        - Consultant
        - Consultant
        - Business Analyst
        - Data Analyst
        - Senior Consultant
        - Principal Consultant
        - Delivery Lead
    department_id: DEPT-PS
    location_id: LOC-SG
    hire_date: ${{fake.date_between(start_date='-39M', end_date='-1M')}}
    current_salary:
      random_number:
        min: 4000
        max: 15000
    salary_currency: SGD
    is_active: true

