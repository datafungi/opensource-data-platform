# ----------------------------
# HR Locations (3 static records)
# ----------------------------

- object: hr_locations
  nickname: LocSG
  count: 1
  fields:
    location_id: LOC-SG
    city: Singapore
    country: Singapore
    currency: SGD
    timezone: Asia/Singapore

- object: hr_locations
  nickname: LocVN
  count: 1
  fields:
    location_id: LOC-VN
    city: Ho Chi Minh City
    country: Vietnam
    currency: VND
    timezone: Asia/Ho_Chi_Minh

- object: hr_locations
  nickname: LocID
  count: 1
  fields:
    location_id: LOC-ID
    city: Jakarta
    country: Indonesia
    currency: IDR
    timezone: Asia/Jakarta


# ----------------------------
# HR Departments (5 static records)
# ----------------------------

- object: hr_departments
  nickname: DeptPS
  count: 1
  fields:
    department_id: DEPT-PS
    department_name: Professional Services
    cost_center: CC-PS-001

- object: hr_departments
  nickname: DeptENG
  count: 1
  fields:
