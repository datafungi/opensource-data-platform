# ----------------------------
# HR Locations (3 static records)
# ----------------------------

- object: hr_locations
  nickname: LocSG
  count: 1
  fields:
    location_id: LOC-SG
    city: Singapore
    country: Singapore
    currency: SGD
    timezone: Asia/Singapore

- object: hr_locations
  nickname: LocVN
  count: 1
  fields:
    location_id: LOC-VN
    city: Ho Chi Minh City
    country: Vietnam
    currency: VND
    timezone: Asia/Ho_Chi_Minh

- object: hr_locations
  nickname: LocID
  count: 1
  fields:
    location_id: LOC-ID
    city: Jakarta
    country: Indonesia
    currency: IDR
    timezone: Asia/Jakarta


# ----------------------------
# HR Departments (5 static records)
# ----------------------------

- object: hr_departments
  nickname: DeptPS
  count: 1
  fields:
    department_id: DEPT-PS
    department_name: Professional Services
    cost_center: CC-PS-001

- object: hr_departments
  nickname: DeptENG
  count: 1
  fields:
    department_id: DEPT-ENG
    department_name: Engineering
    cost_center: CC-ENG-002

- object: hr_departments
  nickname: DeptSALES
  count: 1
  fields:
    department_id: DEPT-SALES
    department_name: Sales
    cost_center: CC-SALES-003

- object: hr_departments
  nickname: DeptHR
  count: 1
  fields:
    department_id: DEPT-HR
    department_name: Human Resources
    cost_center: CC-HR-004

- object: hr_departments
  nickname: DeptFIN
  count: 1
  fields:
    department_id: DEPT-FIN
    department_name: Finance
    cost_center: CC-FIN-005


# ----------------------------
# HR Employees — 9 blocks (3 locations x 3 tiers) = 150 total
# Department distribution target: PS=40%, ENG=25%, SALES=15%, HR=10%, FIN=10%
# ----------------------------

# SG Junior (20 employees)
- object: hr_employees
  nickname: SG_Junior
  count: 20
  fields:
    first_name:
      fake: first_name
    last_name:
      fake: last_name
    email:
      fake: email
    job_title:
      random_choice:
        - Junior Data Engineer
        - Junior Consultant
        - Junior Analyst
        - Junior Developer
    department_id:
      random_choice:
        - DEPT-PS
        - DEPT-PS
        - DEPT-PS
        - DEPT-PS
        - DEPT-ENG
        - DEPT-ENG
        - DEPT-SALES
        - DEPT-HR
        - DEPT-FIN
        - DEPT-PS
    location_id: LOC-SG
    hire_date: ${{fake.date_between(start_date='-39M', end_date='-1M')}}
    current_salary:
      random_number:
        min: 4000
        max: 6000
    salary_currency: SGD
    is_active: true

